<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get started — h_ld.</title>
<link rel="stylesheet" href="https://use.typekit.net/guo5til.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #231F20; --ink-mid: #55555C; --ink-soft: #8A868A;
    --border: #E5E1DE; --white: #fff;
    --sage: #2A2A2E; --sage-pale: #EDF2F0;
    --red: #A8332E; --red-pale: #F7E3E1;
    --peach: #FEEEE1; --peach-border: #EFCBBD;
    --cal-orange: #C2491D; --cal-orange-pale: #FBE7D2;
    --radius: 10px; --radius-lg: 16px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
    background: var(--peach); color: var(--ink); font-size: 14px; line-height: 1.6;
    padding: 40px 20px; min-height: 100vh;
  }
  .card {
    max-width: 460px; margin: 0 auto; background: var(--white);
    border-radius: 28px; padding: 44px 40px; box-shadow: 0 8px 32px rgba(40,20,10,.08);
  }
  .logo { max-width: 200px; height: auto; display: block; margin-bottom: 28px; }
  .heading { font-size: 24px; font-weight: 700; color: var(--ink); margin-bottom: 6px; letter-spacing: -.3px; }
  .sub { font-size: 14px; color: var(--ink-soft); margin-bottom: 28px; }

  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: var(--ink-mid); margin-bottom: 6px; }
  .field input {
    width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: var(--radius);
    font-size: 14px; font-family: inherit; color: var(--ink); background: var(--white);
    transition: border-color .15s;
  }
  .field input:focus { outline: none; border-color: var(--sage); }
  .field-hint { font-size: 12px; color: var(--ink-soft); margin-top: 5px; }
  .field-hint.error { color: var(--red); }
  .field-hint.ok { color: #3D7A5C; }

  .subdomain-row { display: flex; align-items: center; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .subdomain-row input { border: none; border-radius: 0; flex: 1; min-width: 0; }
  .subdomain-row input:focus { outline: none; }
  .subdomain-row.error { border-color: var(--red); }
  .subdomain-row.ok { border-color: #3D7A5C; }
  .subdomain-suffix { padding: 11px 14px; font-size: 13px; color: var(--ink-soft); background: #FAFAF9; border-left: 1px solid var(--border); white-space: nowrap; }
  .subdomain-status { width: 16px; height: 16px; flex-shrink: 0; margin: 0 10px; }

  .btn-primary {
    width: 100%; padding: 13px; border: none; border-radius: var(--radius);
    background: var(--sage); color: #fff; font-size: 15px; font-weight: 600; font-family: inherit;
    cursor: pointer; margin-top: 8px; transition: opacity .15s;
  }
  .btn-primary:hover { opacity: .9; }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

  .error-banner {
    display: none; background: var(--red-pale); color: var(--red); border-radius: var(--radius);
    padding: 11px 14px; font-size: 13px; margin-bottom: 16px;
  }
  .signin-link { text-align: center; font-size: 13px; color: var(--ink-soft); margin-top: 20px; }
  .signin-link a { color: var(--ink); font-weight: 600; text-decoration: none; }
  .signin-link a:hover { text-decoration: underline; }

  .spinner {
    width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff;
    border-radius: 50%; display: inline-block; animation: spin .7s linear infinite; vertical-align: -2px; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="card">
  <img class="logo" src="https://h-ld.com/email-logo-header.png" alt="h_ld. — scheduling system">
  <div class="heading">Get started with h_ld.</div>
  <div class="sub">Create your account and you're straight in — no waiting on approval, just a quick payment step to activate.</div>

  <div class="error-banner" id="error-banner"></div>

  <form id="signup-form" onsubmit="return handleSignup(event)">
    <div class="field">
      <label for="f-org-name">Business name</label>
      <input type="text" id="f-org-name" placeholder="Solful Kinesiology" autocomplete="organization" required oninput="onOrgNameInput()">
    </div>

    <div class="field">
      <label for="f-subdomain">Your booking address</label>
      <div class="subdomain-row" id="subdomain-row">
        <input type="text" id="f-subdomain" placeholder="solful" autocomplete="off" required oninput="onSubdomainInput()">
        <span class="subdomain-status" id="subdomain-status"></span>
        <span class="subdomain-suffix">.h-ld.com</span>
      </div>
      <div class="field-hint" id="subdomain-hint">This is auto-suggested from your business name — feel free to change it.</div>
    </div>

    <div class="field">
      <label for="f-name">Your name</label>
      <input type="text" id="f-name" placeholder="Sarah Mitchell" autocomplete="name" required>
    </div>

    <div class="field">
      <label for="f-email">Email</label>
      <input type="email" id="f-email" placeholder="sarah@example.com" autocomplete="email" required>
    </div>

    <div class="field">
      <label for="f-password">Password</label>
      <input type="password" id="f-password" placeholder="At least 8 characters" autocomplete="new-password" minlength="8" required>
    </div>

    <button type="submit" class="btn-primary" id="submit-btn">Create my account</button>
  </form>

  <div class="signin-link">Already have an account? <a href="/">Sign in</a></div>
</div>

<script>
const API_BASE = '/api';
let _subdomainAvailable = false;
let _subdomainCheckTimer = null;
let _subdomainEditedManually = false;

// Turns "Solful Kinesiology" into "solful-kinesiology" — a reasonable
// starting point the practitioner can still freely edit.
function slugify(str) {
  return str.toLowerCase()
    .replace(/[^a-z0-9\s-]/g, '')
    .trim()
    .replace(/\s+/g, '-')
    .replace(/-+/g, '-')
    .slice(0, 63);
}

function onOrgNameInput() {
  if (_subdomainEditedManually) return; // don't overwrite a subdomain they've already customized
  const slug = slugify(document.getElementById('f-org-name').value);
  document.getElementById('f-subdomain').value = slug;
  checkSubdomain(slug);
}

function onSubdomainInput() {
  _subdomainEditedManually = true;
  const val = slugify(document.getElementById('f-subdomain').value);
  document.getElementById('f-subdomain').value = val;
  checkSubdomain(val);
}

function checkSubdomain(value) {
  const row = document.getElementById('subdomain-row');
  const status = document.getElementById('subdomain-status');
  const hint = document.getElementById('subdomain-hint');
  clearTimeout(_subdomainCheckTimer);
  _subdomainAvailable = false;

  if (!value || value.length < 3) {
    row.className = 'subdomain-row';
    status.innerHTML = '';
    hint.className = 'field-hint';
    hint.textContent = 'This is auto-suggested from your business name — feel free to change it.';
    return;
  }

  status.innerHTML = '<span class="spinner" style="border-color:rgba(0,0,0,.15);border-top-color:var(--ink-soft)"></span>';
  hint.className = 'field-hint';
  hint.textContent = 'Checking availability…';

  _subdomainCheckTimer = setTimeout(async () => {
    try {
      const res = await fetch(`${API_BASE}/auth/check-subdomain?subdomain=${encodeURIComponent(value)}`);
      const data = await res.json();
      _subdomainAvailable = !!data.available;
      if (data.available) {
        row.className = 'subdomain-row ok';
        status.innerHTML = '&#10003;';
        status.style.color = '#3D7A5C';
        hint.className = 'field-hint ok';
        hint.textContent = `${value}.h-ld.com is available`;
      } else {
        row.className = 'subdomain-row error';
        status.innerHTML = '';
        hint.className = 'field-hint error';
        hint.textContent = data.reason || 'Not available';
      }
    } catch (err) {
      hint.className = 'field-hint error';
      hint.textContent = 'Could not check availability — try again';
    }
  }, 400);
}

async function handleSignup(e) {
  e.preventDefault();
  const errorBanner = document.getElementById('error-banner');
  errorBanner.style.display = 'none';

  const subdomain = document.getElementById('f-subdomain').value;
  if (!_subdomainAvailable) {
    errorBanner.textContent = 'Please choose an available booking address before continuing.';
    errorBanner.style.display = 'block';
    document.getElementById('f-subdomain').focus();
    return false;
  }

  const orgName = document.getElementById('f-org-name').value.trim();
  const name = document.getElementById('f-name').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const password = document.getElementById('f-password').value;

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Creating your account…';

  try {
    const res = await fetch(`${API_BASE}/auth/signup`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ subdomain, orgName, name, email, password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Something went wrong');

    // Off to Stripe to actually pay — the account was just created but is
    // deliberately inert until checkout completes (see requireOrg in
    // lib/tenant.js). No free accounts.
    window.location.href = data.checkoutUrl;
  } catch (err) {
    errorBanner.textContent = err.message;
    errorBanner.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Create my account';
  }
  return false;
}
</script>

</body>
</html>
