<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Payment Received — h_ld.</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --sage:       #2A2A2E;
    --sage-mid:   #55555C;
    --sage-light: #E9E6E5;
    --sage-pale:  #F7F5F4;
    --ink:        #231F20;
    --ink-soft:   #8A868A;
    --border:     #DED9D7;
    --bg:         #F5F2F0;
    --white:      #FFFFFF;
    --radius:     12px;
    --shadow-md:  0 4px 16px rgba(0,0,0,.08);
  }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
  }
  .logo { height: 60px; object-fit: contain; margin-bottom: 24px; }
  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 18px;
    width: 100%; max-width: 420px;
    box-shadow: var(--shadow-md);
    overflow: hidden;
    display: flex; flex-direction: column; align-items: center;
    text-align: center; padding: 40px 24px;
  }
  .confirm-icon {
    width: 72px; height: 72px; border-radius: 50%;
    background: var(--sage-light); color: var(--sage);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px;
  }
  .confirm-icon svg { width: 36px; height: 36px; }
  .confirm-title { font-size: 22px; font-weight: 700; color: var(--ink); margin-bottom: 8px; }
  .confirm-sub { font-size: 14px; color: var(--ink-soft); margin-bottom: 28px; line-height: 1.6; }
  .confirm-summary {
    background: var(--sage-pale); border: 1px solid var(--sage-light);
    border-radius: var(--radius); padding: 16px 20px;
    width: 100%; margin-bottom: 4px; text-align: left;
  }
  .confirm-row { display: flex; justify-content: space-between; font-size: 14px; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .confirm-row:last-child { border-bottom: none; }
  .confirm-row .label { color: var(--ink-soft); }
  .note { font-size: 12px; color: var(--ink-soft); margin-top: 16px; line-height: 1.6; }
</style>
</head>
<body>

<svg class="logo" viewBox="0 0 155.78 70.61" xmlns="http://www.w3.org/2000/svg">
  <g fill="#231f20">
    <path d="M29.71,47.43v-11.65c0-4.34-2.17-7.86-6.03-7.86-4.07,0-6.17,3.52-6.17,7.86v11.11c0,3.39,1.15,4.4,4.2,4.61v2.37H4.03v-2.37c3.19-.2,4.34-1.22,4.34-4.61v-29.54c0-3.19-1.56-3.8-4.34-3.59v-2.37l10.23-1.83c2.17-.34,3.25.61,3.25,2.57v12.81c0,2.44,1.22,2.91,2.1,1.9,1.56-2.03,4-4.34,9.21-4.34s10.03,2.17,10.03,11.72v13.21c0,2.3,1.02,3.52,2.98,2.78v1.42c-.88,1.97-3.25,2.64-5.35,2.64-3.93,0-6.77-2.17-6.77-6.84Z"/>
    <path d="M87.48,47.43v-30.08c0-3.19-1.56-3.8-4.34-3.59v-2.37l10.23-1.83c2.17-.34,3.25.61,3.25,2.57v35.3c0,2.3,1.02,3.52,2.98,2.78v1.42c-.95,1.97-3.32,2.64-5.42,2.64-3.86,0-6.7-2.17-6.7-6.84Z"/>
    <path d="M102.13,38.96c0-10.64,7.32-16.26,14.64-16.26s9.42,5.42,9.42-.74v-4.61c0-3.19-1.56-3.8-4.34-3.59v-2.37l10.23-1.83c2.17-.34,3.25.61,3.25,2.57v35.3c0,2.3,1.02,3.52,2.98,2.78v1.42c-.95,1.97-3.32,2.64-5.35,2.64-2.23,0-4.81-.81-5.62-2.84-.47-1.15-1.09-1.76-1.96-1.76-1.49,0-4.07,4.61-10.23,4.61-6.64,0-13.01-5.42-13.01-15.31ZM120.01,49.13c2.71,0,6.17-1.83,6.17-7.59v-4.2c0-8.47-4.47-11.86-8.06-11.86-3.93,0-6.31,4.34-6.31,10.23,0,6.98,3.32,13.42,8.2,13.42Z"/>

  </g>
  <path fill="#231f20" d="M79.16,48.65v5.71h-27.31v-5.71h-3.99v13.69h31.33c2.18,0,3.95-1.77,3.95-3.95v-9.73h-3.99Z"/>
</svg>

<div class="card">
  <div class="confirm-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <div class="confirm-title">Payment received</div>
  <div class="confirm-sub" id="thanks-sub">Thank you — your payment has been processed successfully.</div>
  <div class="confirm-summary" id="thanks-summary" style="display:none"></div>
  <div class="note">You don't need to do anything else. Your appointment record will update automatically within a few moments.</div>
</div>

<script>
function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

async function init() {
  var id = getParam('payment');
  if (!id) return;

  try {
    var res = await fetch(window.location.origin + '/api/bookings/' + id);
    if (!res.ok) return;
    var booking = await res.json();

    document.getElementById('thanks-sub').textContent =
      'Thank you, ' + (booking.client || 'there') + '! Your payment has been received.';

    var summary = document.getElementById('thanks-summary');
    summary.style.display = 'block';
    summary.innerHTML =
      '<div class="confirm-row"><span class="label">Service</span><span>' + (booking.service || '') + '</span></div>' +
      '<div class="confirm-row"><span class="label">Amount</span><span>$' + (parseFloat(booking.price) || 0).toFixed(2) + '</span></div>';
  } catch (e) {
    // Fine to fail silently — this page is a friendly confirmation,
    // not a source of truth. The booking itself updates via webhook.
  }
}

init();
</script>
</body>
</html>
